<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 210" role="img" aria-label="Alera Hair Nail Studio">

  <!-- ── Tagline ── -->
  <text
    x="298" y="26"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="16.5" font-style="italic" fill="#2a2a2a" letter-spacing="0.2"
  >"Freedom To Natural Beauty"</text>

  <!-- ── ALERA (red script) ── -->
  <text
    x="4" y="122"
    font-family="'Brush Script MT', 'URW Chancery L', cursive"
    font-size="108" fill="#CC1F1F" font-weight="bold"
  >Alera</text>

  <!-- ── Vertical comb (red) ── -->
  <g transform="translate(260,38)">
    <!-- spine -->
    <rect x="4" y="26" width="10" height="52" rx="2" fill="#CC1F1F"/>
    <!-- teeth — top section -->
    <rect x="0"  y="0"  width="4" height="28" rx="1.5" fill="#CC1F1F"/>
    <rect x="5"  y="0"  width="4" height="28" rx="1.5" fill="#CC1F1F"/>
    <rect x="10" y="0"  width="4" height="28" rx="1.5" fill="#CC1F1F"/>
    <rect x="15" y="0"  width="4" height="28" rx="1.5" fill="#CC1F1F"/>
  </g>

  <!-- ── HAIR (bold red) ── -->
  <text
    x="284" y="114"
    font-family="'Arial Black', 'Franklin Gothic Heavy', Impact, sans-serif"
    font-size="74" fill="#CC1F1F" font-weight="900" letter-spacing="-1"
  >Hair</text>

  <!-- ── TM ── -->
  <text
    x="448" y="58"
    font-family="Arial, sans-serif"
    font-size="15" fill="#CC1F1F" font-weight="700"
  >TM</text>

  <!-- ── Scissors (black) centred between words ── -->
  <!-- Lower blade -->
  <g transform="translate(178,95) rotate(-42)">
    <circle cx="0" cy="0" r="7.5" fill="#111" />
    <circle cx="0" cy="0" r="4.5" fill="white" />
    <rect x="6" y="-3" width="62" height="6" rx="3" fill="#111"/>
    <!-- Upper blade -->
    <circle cx="0" cy="17" r="7.5" fill="#111" />
    <circle cx="0" cy="17" r="4.5" fill="white" />
    <rect x="6" y="14" width="62" height="6" rx="3" fill="#111"/>
    <!-- Pivot -->
    <circle cx="12" cy="8.5" r="3" fill="#444"/>
  </g>

  <!-- ── NAIL STUDIO (red script) ── -->
  <text
    x="18" y="196"
    font-family="'Brush Script MT', 'URW Chancery L', cursive"
    font-size="94" fill="#CC1F1F" font-weight="bold"
  >Nail Studio</text>

</svg>
